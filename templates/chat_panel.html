<aside class="chat-section" id="chat-panel">
    <div class="chat-header-bar" id="chat-header">
        <h2>Pool Chat</h2>
        <div class="chat-controls">
            <button class="chat-toggle-btn" id="expand-toggle-btn" title="Toggle Size">⤢</button>
            <button class="chat-toggle-btn" id="collapse-toggle-btn" title="Minimize">−</button>
        </div>
    </div>
    <div class="chat-body" id="chat-panel-body">
        <div class="chat-history" id="chat-stream-box">
            {% if chat_messages %}
                {% for msg in chat_messages %}
                    <div class="chat-container {% if msg.user_id == current_user.user_id %}outgoing{% else %}incoming{% endif %}">
                         <span class="chat-sender">{{ msg.user.username }}</span>
                         <p>{{ msg.text }}</p>
                         <span class="chat-time">{{ msg.time_sent.strftime('%I:%M %p') }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <form class="chat-input-form" id="chat-input-form" method="POST"
            action="{{ url_for('send_message', pool_id=pool.group_id) if pool else '#' }}">
            <input type="text" id="message-input-field" name="text" class="text-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="chat-send-btn">Send</button>
        </form>
    </div>
</aside>

<script>
    // Define global constants from Jinja so Pusher script never fails
    const POOL_ID = parseInt("{{ pool.group_id if (pool and pool.group_id is defined) else 0 }}") || 0;
    const CURRENT_USERNAME = "{{ current_user.username if current_user and current_user.is_authenticated else '' }}";

    document.addEventListener("DOMContentLoaded", () => {
        const chatPanel = document.getElementById('chat-panel');
        const chatHeader = document.getElementById('chat-header');
        const chatStreamBox = document.getElementById('chat-stream-box');
        const expandBtn = document.getElementById('expand-toggle-btn');
        const collapseBtn = document.getElementById('collapse-toggle-btn');
        const chatForm = document.getElementById('chat-input-form');

        // Initial Scroll
        if (chatStreamBox) chatStreamBox.scrollTop = chatStreamBox.scrollHeight;

        // --- Layout Toggles ---
        if (chatHeader) {
            chatHeader.addEventListener('click', (e) => {
                if (e.target === expandBtn || e.target === collapseBtn) return;
                chatPanel.classList.remove('is-expanded');
                chatPanel.classList.toggle('is-collapsed');
                if (collapseBtn) collapseBtn.textContent = chatPanel.classList.contains('is-collapsed') ? '＋' : '−';
            });
        }

        if (collapseBtn) {
            collapseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                chatPanel.classList.remove('is-expanded');
                chatPanel.classList.toggle('is-collapsed');
                collapseBtn.textContent = chatPanel.classList.contains('is-collapsed') ? '＋' : '−';
            });
        }

        if (expandBtn) {
            expandBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                chatPanel.classList.remove('is-collapsed');
                if (collapseBtn) collapseBtn.textContent = '−';
                chatPanel.classList.toggle('is-expanded');
                expandBtn.textContent = chatPanel.classList.contains('is-expanded') ? '⤡' : '⤢';
                setTimeout(() => { if (chatStreamBox) chatStreamBox.scrollTop = chatStreamBox.scrollHeight; }, 150);
            });
        }

        // --- AJAX Send Handling ---
        if (chatForm) {
            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('message-input-field');
                const messageText = input.value.trim();
                if (!messageText) return;

                const formData = new FormData(chatForm);

                try {
                    const response = await fetch(chatForm.action, { method: 'POST', body: formData });
                    if (response.ok) {
                        input.value = ''; // Clear input only after successful send
                    }
                } catch (err) {
                    console.error("Error sending message:", err);
                }
            });
        }

        // --- Pusher Live Updates ---
        if (POOL_ID > 0) {
            const pusher = new Pusher("{{ pusher_key }}", {
                cluster: "{{ pusher_cluster }}",
                encrypted: true
            });

            const channel = pusher.subscribe('pool-' + POOL_ID);

            channel.bind('new-message', function(data) {
                if (!chatStreamBox) return;

                const div = document.createElement('div');
                div.className = `chat-container ${data.username === CURRENT_USERNAME ? 'outgoing' : 'incoming'}`;
                div.innerHTML = `
                    <span class="chat-sender">${data.username}</span>
                    <p>${data.text}</p>
                    <span class="chat-time">${data.time_sent}</span>
                `;

                chatStreamBox.appendChild(div);
                chatStreamBox.scrollTop = chatStreamBox.scrollHeight;
            });
        }
    });
</script>
