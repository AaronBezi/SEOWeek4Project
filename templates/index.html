<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Pool</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="landing-view" class="view active">
        <h1 class="brand-title">Study Pool</h1>
        <p class="brand-tagline">Share your study space, upload documents, and get quick summaries.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}        

        <div class="button-container">
            <a class="capsule-btn" href="{{ url_for('login') }}">
                Sign In
            </a>
            <a class="capsule-btn" href="{{ url_for('create_pool') }}">
                Create Pool
            </a>
            <a class="capsule-btn" href="{{ url_for('join_pool') }}">
                Join Pool
            </a>
            <a class="capsule-btn" href="{{ url_for('my_notes') }}">
                My Notes
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
