<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Pool - Smart Recommendations Sandbox</title>

    <!-- key fonts used throughout -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">

    <style>
        /* WEBSITES ORIGINAL STYLE SHEET */
        :root {
            --bg-color: #1F628E;
            --btn-bg: #2d3748;
            --text-dark: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sofia Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* View switcher styling */
        .view {
            display: none;
        }
        .view.active {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* Header */
        header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-family: 'Geist Pixel', sans-serif;
            font-size: 28.8px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            text-shadow: 1px 0px 0px currentColor, -1px 0px 0px currentColor;
        }

        .pool-title {
            font-family: 'Geist Pixel', sans-serif;
            font-size: 22.4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* The White Board container matching your layout */
        .workspace-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 24px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .notes-section {
            background: #ffffff;
            color: var(--text-dark);
            border-radius: 16px;
            padding: 48px; /* compacted padding */
            flex: 1;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            min-height: 500px;
            position: relative;
        }

        .notes-section h2 {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
            margin-bottom: 24px;
            color: var(--bg-color);
            font-size: 32px;
        }

        /* list row inline button actions */
        .capsule-btn {
            background-color: #e5e7eb;
            color: var(--text-dark);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .capsule-btn:hover {
            background-color: #d1d5db;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .auth-back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            margin-bottom: 24px;
            color: #ffffff;
            font-size: 14px;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .auth-back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* New Styling for Recommendations Page */
        .search-container {
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 14px 24px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--bg-color);
            box-shadow: 0 0 0 3px rgba(31, 98, 142, 0.15);
        }

        /* Layout Options & Section Header Controls */
        .section-header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        .section-header-controls h2 {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .layout-toggle-btn {
            background: none;
            border: 1px solid #d1d5db;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #4b5563;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }

        .layout-toggle-btn:hover {
            background-color: #f3f4f6;
        }

        /* Default layout mode: Book List Rows */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .book-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            background: #f9fafb;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
        }

        .book-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--bg-color);
            line-height: 1.3;
        }

        .book-authors {
            font-size: 13px;
            color: #4b5563;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .book-desc {
            font-size: 14.4px;
            color: #64748b;
            line-height: 1.5;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-link-btn {
            font-size: 13.6px;
            padding: 10px 22px;
            min-width: 90px;
            text-align: center;
            flex-shrink: 0;
            background-color: var(--btn-bg);
            color: white;
        }

        .book-link-btn:hover {
            background-color: #1a202c;
        }

        /* Grid layout switch style overrides */
        .book-list.grid-active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .book-list.grid-active .book-row {
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            height: 100%;
            padding: 24px;
            min-height: 250px;
        }

        .book-list.grid-active .book-link-btn {
            width: 100%;
            margin-top: 12px;
            align-self: stretch;
        }

        .placeholder-text {
            color: #64748b;
            font-style: normal;
            line-height: 1.7;
            font-size: 17.6px;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div id="recommendations-view" class="view active">
        <!-- study pool style header -->
        <header>
            <div class="logo">STUDY POOL</div>
            <div class="pool-title">Browse Recommendations</div>
        </header>

        <div class="workspace-container">
            <main class="notes-section">

                <!-- layout switcher header -->
                <div class="section-header-controls">
                    <h2>Recommended Sources</h2>
                    <button class="layout-toggle-btn" onclick="toggleLayoutMode()">Layout</button>
                </div>

                <!-- search bar -->
                <div class="search-container">
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="Search for key elements ..."
                        oninput="runLiveSearch()"
                    >
                    <button class="capsule-btn" onclick="runLiveSearch()" style="background-color: var(--bg-color); color: #ffffff;">Search</button>
                </div>

                <!-- switches layouts seamlessly -->
                <div class="book-list" id="book-feed">
                </div>
            </main>
        </div>

        <a class="auth-back-link" href="#">Back to home</a>
    </div>
    <!-- mock examples provided from Gemini prompt -->
    <script>
        // High quality data mimicking the structure from Google Books
        const bookDatabase = [
            {
                title: "Introduction to Python Programming",
                authors: "John C. Lusth",
                description: "A clear-headed, fundamental textbook outlining computer science foundations, clean structural code concepts, and algorithms built on Python.",
                link: "https://books.google.com"
            },
            {
                title: "College Physics for Scientists & Engineers",
                authors: "Hugh D. Young",
                description: "The primary reference volume tracking mechanics, thermodynamics, kinematics, wave mechanics, and particle collisions.",
                link: "https://books.google.com"
            },
            {
                title: "Calculus: Early Transcendentals",
                authors: "James Stewart",
                description: "Famous textbook offering extreme conceptual precision, practical examples, and advanced mathematical formulas covering limits and derivatives.",
                link: "https://books.google.com"
            },
            {
                title: "Fundamentals of Organic Chemistry",
                authors: "Jonathan Clayden",
                description: "A modular framework illustrating molecular geometry, reaction pathways, physical structural properties, and chemical synthesis.",
                link: "https://books.google.com"
            }
        ];

        const feed = document.getElementById('book-feed');

        // Render function mapping out standard row components
        function displayBooks(books) {
            feed.innerHTML = '';

            if (books.length === 0) {
                feed.innerHTML = `<p class="placeholder-text">No recommendations found matching your search. Try searching something else!</p>`;
                return;
            }

            books.forEach(book => {
                const card = `
                    <div class="book-row">
                        <div class="book-info">
                            <span class="book-title">${book.title}</span>
                            <span class="book-authors">By ${book.authors}</span>
                            <p class="book-desc">${book.description}</p>
                        </div>
                        <a class="capsule-btn book-link-btn" href="${book.link}" target="_blank">View</a>
                    </div>
                `;
                feed.innerHTML += card;
            });
        }

        // Live filtering script
        function runLiveSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const matches = bookDatabase.filter(book =>
                book.title.toLowerCase().includes(query) ||
                book.authors.toLowerCase().includes(query) ||
                book.description.toLowerCase().includes(query)
            );
            displayBooks(matches);
        }

        // Toggles layout grid view on and off
        function toggleLayoutMode() {
            feed.classList.toggle('grid-active');
        }

        // Initialize display
        displayBooks(bookDatabase);
    </script>
</body>
</html>
